weight = 20

[[grading]]
component = "Core Competencies: Set Up & Run"
weight = 25

[[grading]]
component = "Projects: Apply & Share"
weight = 45


[modules]
module0 = "Review course administration and policies (complete this first)"
module1 = "Set up Python environment, projects, notebooks, and Git workflow for reproducible analysis."
module2 = "Work with Python data structures and text data; tokenize and preprocess text."
module3 = "Explore and interpret text data using visualization."
module4 = "Acquire structured text from APIs and process JSON responses for NLP workflows."
module5 = "Extract data from web documents using HTML, CSS, and DOM structure."
module6 = "Clean text and build NLP pipelines to analyze web text."
module7 = "Build an integrated web mining and NLP portfolio; explore embeddings, retrieval, and modern NLP tools."
