[[learning_outcomes]]
id = "LO2"
description = "Select and apply appropriate tools, query methods, and data handling techniques to create, query, and transform relational and non-relational data, including importing, exporting, and assessing data quality."
assessment = ["Core competencies", "Discussions", "GUIDEs", "Projects"]

[[learning_outcomes]]
id = "LO3"
description = "Design data solutions using relational and non-relational structures that address a defined data management, reporting, or analytics objective."
assessment = ["Core competencies", "Discussions", "GUIDEs", "Projects"]

[[learning_outcomes]]
id = "LO4"
description = "Implement database and data processing workflows, generate and communicate query-based results."
assessment = ["Core competencies", "Discussions", "GUIDEs", "Projects"]

