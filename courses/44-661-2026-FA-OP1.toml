# Modules 2, 4, 5, and 7 are the ones meaningfully impacted by the new edition
# Module 2 New book adds:
# CTEs (explicit)
# window functions (stronger emphasis)
# analytics-oriented query building
# Module 3
# focuses more on complex data types inside SQL (JSON, arrays)
# less emphasis on separate NoSQL systems
# Module 4 New book adds:
# COPY / data loading workflows
# Python integration explicitly
# automation emphasis
# Module 5 New book strongly expands:
# JSON + arrays
# text
# geospatial
# time-series
# advanced data types


[modules]
module0 = "Review course administration and policies (complete this first)"
module1 = "Fundamentals of relational databases; tables, primary keys, CRUD operations, and core data types (numeric, character, date/time)."
module2 = "SQL for analytics; SELECT, joins, GROUP BY, basic CTEs, and CASE (Ch 6-9). Tools: DuckDB, Python, .sql files."
module3 = "Working with semi-structured data; JSON basics and simple extraction, plus conceptual overview of non-relational systems (Ch 11-12). Tools: DuckDB, Python (JSON)."
module4 = "Moving and preparing data; import/export (COPY), handling nulls, and basic Python integration (Ch 3-4). Tools: DuckDB, Postgres, Python."
module5 = "Data types for analytics; text and date/time handling, with simple time-based analysis (Ch 12-13). Tools: DuckDB, Python."
module6 = "Analytical SQL patterns; aggregations, multi-step queries with CTEs, introduction to window functions, and building reusable queries for reporting. Tools: DuckDB, Postgres."
module7 = "Integrated portfolio; working with diverse data sources (IoT, event hubs, data lakes, streaming data) and planning for evolution of data systems."
