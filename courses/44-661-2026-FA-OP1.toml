course_short_name = "DB for Analytics"
placement = "Take this course early in the program."
prereqs = "Acceptance into the program."
credits = "3"

description = """
This course explores data from both a storage and analytical perspective.
Topics such as relational and non-relational database functionality
and constraints, local and cloud database considerations, relevant
data types, and data manipulation are included. Students will receive
hands-on experience working with relational, non-relational databases
and data manipulation tools.
"""

rationale = """
Applied data analytics often requires interfacing with a variety of
data and databases. These crucial topics lay a solid foundation
for success in subsequent courses.
"""

materials_textbook = """
Optional resource (recommended for in-depth understanding).
SQL for Data Analytics: Analyze data effectively, uncover insights
and master advanced SQL for real-world applications (4th Ed 2025)
or Malik, U., Goldwasser, M., & Johnston, B. (2020). The Applied SQL
Data Analytics Workshop: A Quick, Interactive Approach to Learning
Analytics with SQL (2nd Ed 2020). Packt Publishing or Amazon.
"""

materials_other = "Additional free resources as directed by instructor."

