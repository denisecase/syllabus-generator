course_short_name = "Data Viz"
placement = "Take this course early in the program."
prereqs = "Acceptance into the program."
credits = "3"

description = """
This course covers the design and development of exploratory diagrams and
graphics for various data sets. The course may include concepts such as
chart and graph design, networks, topological graphs, display of
multi-dimensional data, effective use of space and color, animations,
interactive visualizations, mapping, cartography, web data acquisition,
and advanced visualization tools.

"""

rationale = """
This course develops the ability to transform data into effective
visual representations that support analysis and decision-making.
Students learn how to select, design, and evaluate visualizations,
moving from data preparation to interactive dashboards and data
storytelling. Emphasis is placed on choosing appropriate visual
forms, avoiding misleading representations, and communicating
insights clearly and professionally.
"""

materials_textbook = """
There is no required textbook for this course. We will use Excel, Tableau, Tableau Data Prep, and Tableau Public. Course materials will be available online and via the course site.
"""

materials_other = "Additional free resources as directed by instructor."

