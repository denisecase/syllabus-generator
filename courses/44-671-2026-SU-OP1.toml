[modules]
module0 = "Course administration and policies (complete this first)."
module1 = "Foundations of streaming analytics; data in motion, producer-consumer pipelines, and core concepts (topics, partitions, offsets)."
module2 = "Producing and consuming streaming data."
module3 = "Structured (CSV) and semi-structured (JSON) streaming data (schemas, consistency, reliability)."
module4 = "Analyzing and visualizing streaming data (time windows and rolling metrics)."
module5 = "Enriching streaming data with static (reference) data and integrating with data-at-rest systems."
module6 = "Building and customizing an end-to-end streaming pipeline."
module7 = "Integrated streaming portfolio; refine project work and plan for sustainability and evolution of streaming systems."
