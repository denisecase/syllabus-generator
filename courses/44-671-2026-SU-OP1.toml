course_prefix = "44"
course_number = "671"
course_sections = "80/81"
course_year = "2026"
course_yy = "26"
course_season = "Summer"
course_block = "OP1"
course_name_line1 = "Streaming"
course_name_line2 = "Data"
course_short_name = "Streaming Data"
placement = "Take this course later in the degree program."
prereqs = "44-608 Data Analytics Fundamentals is strongly recommended if new to programming and Python."
credits = "3"

description = """
This course provides an introduction to the principles, properties, and
tools of streaming data in the context of analytics. Students will learn
how to understand, process, extract insights, and respond to massive
volume and high-rate data generated from a variety of sources such as
real-time business transaction and social media networks using
streaming data models, approaches, languages, and processing tools.
"""

rationale = """
Streaming data is unbounded data in motion, generated continuously at
high volume and velocity. This course examines core challenges in
processing streaming data and introduces practical tools and techniques
for building producer-consumer pipelines. Students implement and run
professional projects and complete custom applications. By the end of
the course, students can explain producer-consumer solutions, implement
data producers and consumers, and evaluate modern streaming technologies.
"""

materials_textbook = """
No textbook required. Course materials will be available online and via the course site.
"""

materials_other = "Additional free resources as directed by instructor."

[[learning_outcomes]]
id = "LO1"
description = "Describe the fundamental principles and tools of streaming analytics, including data-in-motion concepts, real-time processing, and the roles of producers and consumers in data pipelines."
assessment = ["Core competencies", "Discussions", "GUIDEs", "Projects"]

[[learning_outcomes]]
id = "LO2"
description = "Select and employ appropriate tools and techniques to produce, consume, analyze, and visualize streaming data using Python, Kafka, GitHub, and professional analytics workflows."
assessment = ["Core competencies", "Discussions", "GUIDEs", "Projects"]

[[learning_outcomes]]
id = "LO3"
description = "Design and apply analytics and visualization techniques to extract insights from structured and semi-structured streaming data, including implementing data producers and consumers."
assessment = ["Core competencies", "Discussions", "GUIDEs", "Projects"]

[[learning_outcomes]]
id = "LO4"
description = "Plan and execute comprehensive streaming data pipelines, integrating real-time data flows with data-at-rest systems, customized analytics, and professional reporting."
assessment = ["Core competencies", "Discussions", "GUIDEs", "Projects"]

