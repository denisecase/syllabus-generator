[modules]
module0 = "Review course administration and policies (complete this first)"
module1 = "Use professional Python and apply descriptive statistics (Ch 2)"
module2 = "Write control flow and functions; calculate measures of central tendency and dispersion (Ch 3-4)"
module3 = "Use core data structures and ingest data from CSV, JSON, Excel, and text (Ch 5-6)"
module4 = "Work with arrays and strings; analyze tabular data with pandas and create charts (Ch 7-8)"
module5 = "Query relational data using SQL (Ch 9, 17.2)"
module6 = "Apply exploratory data analytics in a project"
module7 = "Analyze time series and apply simple linear regression for basic predictive analytics (Ch 10.16, 15.4)"


