description = """
This course provides foundational skills needed in subsequent courses
and includes an introduction to descriptive and predictive analytics.
It includes a review of basic statistics, and introduction to key tools
such as Python, Excel, and Structured Query Language. The course focuses
on key foundations of importing, querying, and processing data and
characterizing and visualizing information.
"""

rationale = """
Applied data analytics covers multiple disciplines and skills, including
statistics, computer science, data processing, programming with Python,
and more. These crucial topics lay a solid foundation for success in
subsequent courses.
"""

materials_textbook = """
Intro to Python for Computer Science and Data Science: Learning
to Program with AI, Big Data and The Cloud, by Paul J. Deitel,
Harvey M. Deitel, 2020, Pearson, ISBN 9780135404676 (link).
Digital or paper / buy or rent / new or used / no access code required.
Please get a copy before class starts; we have short activities that
we'll start on Day 1.
"""

