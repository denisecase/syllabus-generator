[[learning_outcomes]]
id = "LO3"
description = "Design continuous intelligence components and monitoring pipelines that address defined monitoring and decision-making requirements."
assessment = ["Core competencies", "Discussions", "GUIDEs", "Projects"]

[[learning_outcomes]]
id = "LO4"
description = "Implement and evolve continuous intelligence systems that operate correctly, generate interpretable evidence, and adapt to changing data, requirements, or scale."
