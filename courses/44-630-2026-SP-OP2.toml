prereqs = "Acceptance into the program."
credits = "3"

description = """
This course offers an introduction to the concepts and implementation of
systems for continuous intelligence and interactive analytics. It
includes ingesting and processing raw data and presenting evolving
analytics in engaging, easy-to-understand, actionable formats.
"""

rationale = """
Massive amounts of live data must be quickly processed and provided to managers to
make immediate informed decisions. Continuous intelligence systems monitor, detect,
 and respond to changing conditions in real time. Analysts provide judgment regarding
 measuring useful signals, detecting state changes, and making better decisions
 using continuous data. This course introduces processing data in motion and develops
 durable skills transferable across domains and tools in conjunction with AI-assisted
 analytics.
"""

materials_textbook = """
There is no required textbook for this course.
"""

