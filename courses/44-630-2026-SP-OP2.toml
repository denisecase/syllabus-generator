[modules]
module0 = "Review course administration and policies (complete this first)"
module1 = "Introduction to continuous intelligence (CI) and CI projects. Reason about continuous systems vs. batch snapshots. Set up machine. Set up and run example project."
module2 = "Distinguish signal from noise and detect anomalies."
module3 = "Define what to measure: feature engineering and signal design."
module4 = "Reason about time as a variable: time series and rolling windows."
module5 = "Detect drift and identify when a system has changed state."
module6 = "Assess system state in a continuous system; integrate signals, apply thresholds, and interpret results."
module7 = "Integrated continuous intelligence portfolio; communicate findings and insights effectively."
