course_prefix = "44"
course_number = "670"
course_sections = "80/81"
course_year = "2026"
course_yy = "26"
course_season = "Summer"
course_block = "OP2"
course_name_line1 = "Applied"
course_name_line2 = "Machine Learning (ML)"
course_short_name = "Applied ML"
placement = "Take this course any time after completing 44-608 Data Analytics Fundamentals."
prereqs = "44-608 or instructor permission."
credits = "3"

description = """
Students will use machine learning models to build tools to perform novel analyses of
data sets. Topics will include data acquisition and cleaning, selecting and evaluating
predictive models, regression models, classification models, and deep learning with
neural nets.
"""

rationale = """
In today's automated society, massive amounts of data are collected. Data, however,
is not information. Machine learning provides tools that can analyze data to allow
decisions to be made via software tools. We will look at the application of those
tools in this course to produce high quality models.
"""

materials_textbook = """
No textbook required. Course materials will be available online and via the course site.
"""

materials_other = "Additional free resources as directed by instructor."

[[learning_outcomes]]
id = "LO1"
description = "Describe the role of machine learning in modern analytics, including common problem types, data requirements, and the structure of end-to-end ML workflows."
assessment = ["Core competencies", "Discussions", "GUIDEs", "Projects"]

[[learning_outcomes]]
id = "LO2"
description = "Select and prepare data for machine learning by acquiring, cleaning, transforming, and validating datasets using appropriate tools and reproducible workflows."
assessment = ["Core competencies", "Discussions", "GUIDEs", "Projects"]

[[learning_outcomes]]
id = "LO3"
description = "Design and develop machine learning models by selecting appropriate algorithms, training and evaluating models, and refining features to address a defined analytical objective."
assessment = ["Core competencies", "Discussions", "GUIDEs", "Projects"]

[[learning_outcomes]]
id = "LO4"
description = "Implement and share machine learning solutions by training and applying models, interpreting results, communicating findings, and considering how models may be updated and improved over time."
assessment = ["Core competencies", "Discussions", "GUIDEs", "Projects"]

[[grading]]
component = "Core Competencies: Preview & Plan"
weight = 10

[[grading]]
component = "GUIDEs: Explore & Learn"
weight = 20

[[grading]]
component = "Core Competencies: Set Up & Run"
weight = 25

[[grading]]
component = "Projects: Apply & Share"
weight = 45


[modules]
module0 = "Review course administration and policies (complete this first)"
module1 = "Foundations of machine learning and analytics workflows; problem types, data, features, models, and end-to-end pipelines."
module2 = "Working with data and features; acquiring, cleaning, transforming, and validating datasets for machine learning."
module3 = "Classification models; training, evaluating, and interpreting classification results."
module4 = "Regression models; training, evaluating, and interpreting continuous predictions."
module5 = "Ensemble methods; improving model performance and robustness through combined models."
module6 = "Deploying and operationalizing models; packaging, reproducibility, and communicating results."
module7 = "Integrated ML portfolio; explore deep learning and neural nets, plan for maintenance and evolution."
